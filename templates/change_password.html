{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 class="card-title">修改密码</h2>

    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}

    {% if success %}
        <div class="success-msg">{{ success }}</div>
    {% endif %}

    <form method="post" action="/change-password" class="login-form">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" class="form-input" placeholder="输入要修改密码的用户名" value="{{ session.get('username', '') }}" required>
        </div>
        <div class="form-group">
            <label for="new_password">新密码</label>
            <input type="password" id="new_password" name="new_password" class="form-input" placeholder="输入新密码" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">确认修改</button>
    </form>

    <div class="action-group" style="margin-top: 20px;">
        <a href="/" class="btn btn-outline">返回首页</a>
    </div>
</div>
{% endblock %}

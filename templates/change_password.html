{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 class="card-title">修改密码</h2>

    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}

    {% if success %}
        <div class="success-msg">{{ success }}</div>
    {% endif %}

    <div class="policy-notice">
        <strong>📋 密码策略要求：</strong>
        <ul>
            <li>长度至少 10 个字符</li>
            <li>至少包含 1 个大写字母</li>
            <li>至少包含 1 个小写字母</li>
            <li>至少包含 1 个数字</li>
            <li>至少包含 1 个特殊符号 (!@#$%^&amp;* 等)</li>
            <li>建议每 90 天更换一次密码</li>
        </ul>
    </div>

    <form method="post" action="/change-password" class="login-form">
        <div class="form-group">
            <label for="old_password">当前密码</label>
            <input type="password" id="old_password" name="old_password" class="form-input" placeholder="输入当前密码" required autocomplete="current-password">
        </div>
        <div class="form-group">
            <label for="new_password">新密码</label>
            <input type="password" id="new_password" name="new_password" class="form-input" placeholder="输入新密码" required autocomplete="new-password">
        </div>
        <div class="form-group">
            <label for="confirm_password">确认新密码</label>
            <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="再次输入新密码" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary btn-full">确认修改</button>
    </form>

    <div class="action-group" style="margin-top: 20px;">
        <a href="/" class="btn btn-outline">返回首页</a>
    </div>
</div>
{% endblock %}

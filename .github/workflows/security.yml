name: 🔒 安全审计 CI/CD 流水线

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # ⑤ 每周日凌晨 2:00 自动执行全量安全扫描
    - cron: "0 2 * * 0"

jobs:
  # ======================== Job 1: 静态代码审计 ========================
  static-analysis:
    name: "Bandit 静态安全审计"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install bandit bcrypt python-dotenv flask flask-talisman

      - name: 运行 Bandit 安全扫描
        run: |
          bandit -c .bandit -r app.py -f txt
        continue-on-error: false

  # ======================== Job 2: 安全单元测试 ========================
  unit-tests:
    name: "安全单元测试 (pytest)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install pytest bcrypt python-dotenv flask flask-talisman

      - name: 运行安全测试
        run: |
          cd /opt/Class01
          python -m pytest tests/test_security.py -v --tb=short
        working-directory: /opt/Class01
        env:
          SECRET_KEY: "ci-test-key-for-github-actions-64chars!!"
          LOG_LEVEL: ERROR

  # ======================== Job 3: 依赖漏洞扫描 ========================
  dependency-scan:
    name: "依赖漏洞扫描 (pip-audit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖与审计工具
        run: |
          pip install pip-audit
          pip install -r requirements.txt 2>/dev/null || true

      - name: 运行依赖漏洞审计
        run: |
          pip-audit
        continue-on-error: true
